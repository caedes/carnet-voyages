name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Security audit
        run: |
          set +e
          yarn audit --level high
          AUDIT_EXIT=$?
          set -e
          if [ $((AUDIT_EXIT & 24)) -ne 0 ]; then
            echo "High or critical vulnerabilities found"
            exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
